version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: twinanalytics_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-twinanalytics}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: twinanalytics_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-twinanalytics}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Uncomment to run initialization scripts on first boot
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-twinanalytics}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
